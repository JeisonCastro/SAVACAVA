<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Jeison Digital AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #0f172a; 
            color: white; 
        }
        .login-card { 
            background: #1e293b; 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 380px; 
            text-align: center;
            border: 1px solid #334155;
        }
        h2 { margin-bottom: 0.5rem; color: #f8fafc; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            outline: none;
        }
        input:focus { border-color: #3b82f6; ring: 2px #3b82f6; }
        button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 12px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-size: 1rem;
        }
        .btn-log { background: #3b82f6; color: white; }
        .btn-log:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-reg { 
            background: transparent; 
            color: #10b981; 
            border: 1px solid #10b981; 
            margin-top: 8px;
        }
        .btn-reg:hover { background: rgba(16, 185, 129, 0.1); }
        .footer-text { margin-top: 1.5rem; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Fábrica de Agentes</h2>
        <p>Crea tus bots y gestiona tus tokens</p>
        
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        
        <button class="btn-log" onclick="entrar()">Iniciar Sesión</button>
        <button class="btn-reg" onclick="registrar()">Crear Cuenta</button>
        
        <div class="footer-text">
            Al registrarte, recibes 10,000 tokens gratis.
        </div>
    </div>

    <script>
        // CONFIGURACIÓN - PEGA TUS DATOS AQUÍ
        const SUPABASE_URL = "https://zsxkfqnalkfvwjrzuqip.supabase.co";
        const SUPABASE_KEY = "PEGA_AQUI_TU_LLAVE_ANON_PUBLIC"; 

        // Inicializamos el cliente (usamos _supabase para evitar conflictos)
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FUNCIÓN PARA REGISTRARSE
        async function registrar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) return alert("Por favor completa los campos");

            const { data, error } = await _supabase.auth.signUp({ email, password });
            
            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("¡Registro exitoso! Ya puedes entrar.");
            }
        }

        // FUNCIÓN PARA INICIAR SESIÓN
        async function entrar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) return alert("Por favor completa los campos");

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Acceso denegado: " + error.message);
            } else {
                // Si el login es correcto, enviamos al usuario al dashboard
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
