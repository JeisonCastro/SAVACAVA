<script>
    // 1. Configuramos las credenciales
    const SUPABASE_URL = "https://zsxkfqnalkfvwjrzuqip.supabase.co";
    const SUPABASE_KEY = "TU_CLAVE_ANON_PUBLICA_AQUI"; // Pega aquí tu clave anon public

    // 2. Inicializamos el cliente de Supabase una sola vez
    // Usamos 'window.supabaseClient' para evitar conflictos de nombres
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. Función para registrar nuevos usuarios
    async function registrar() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) return alert("Por favor llena todos los campos");

        const { data, error } = await _supabase.auth.signUp({ email, password });
        
        if (error) {
            alert("Error al registrar: " + error.message);
        } else {
            alert("¡Usuario creado con éxito! Ya puedes iniciar sesión.");
        }
    }

    // 4. Función para entrar al sistema
    async function entrar() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) return alert("Por favor llena todos los campos");

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Error de acceso: " + error.message);
        } else {
            // Si todo sale bien, lo mandamos al dashboard
            window.location.href = "dashboard.html";
        }
    }
</script>
