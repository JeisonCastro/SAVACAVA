<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;--bg2:#0d1117;--surface:#161e2a;--border:#1e2d40;--border2:#253648;
  --accent:#0ea5e9;--accent2:#38bdf8;--green:#22d3a5;--red:#f87171;--yellow:#fbbf24;
  --text:#e8f0f8;--muted:#7a98b8;--dim:#4a6580;
  --chat-bg:#0b141d;--chat-panel:#111b24;--bubble-user:#111b24;--bubble-ai:#0b3a4d;--bubble-human:#0b5d4a;
  --shadow-soft:0 18px 60px rgba(0,0,0,.28);
  --safe-top:env(safe-area-inset-top, 0px);--safe-bottom:env(safe-area-inset-bottom, 0px);
}
body.light-mode{
  --bg:#eef4f8;--bg2:#ffffff;--surface:#ffffff;--border:#d9e6ef;--border2:#c4d6e4;
  --accent:#0284c7;--accent2:#0ea5e9;--green:#059669;--red:#dc2626;--yellow:#d97706;
  --text:#0f172a;--muted:#475569;--dim:#7890a4;
  --chat-bg:#e7f0f4;--chat-panel:#f7fbfd;--bubble-user:#ffffff;--bubble-ai:#dff3ff;--bubble-human:#dcfce7;
  --shadow-soft:0 18px 60px rgba(15,23,42,.10);
}
html{height:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100%;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}

/* BG */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.18;pointer-events:none}
.bg-glow{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(14,165,233,.1) 0%,transparent 70%);pointer-events:none}

/* CARD */
.card{
  position:relative;z-index:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:2.5rem 2rem;
  width:100%;
  max-width:380px;
  margin:1rem;
  box-shadow:0 24px 60px rgba(0,0,0,.4);
}
@media(max-width:420px){
  .card{margin:.75rem;padding:2rem 1.5rem;border-radius:18px}
}
@media(max-height:700px){
  .card{padding:1.5rem 1.5rem}
}

/* LOGO */
.logo-row{display:flex;align-items:center;gap:8px;margin-bottom:2rem;justify-content:center}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:.04em;color:var(--text)}
.card-title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text);text-align:center;margin-bottom:.4rem}
.card-sub{font-size:.88rem;color:var(--muted);text-align:center;margin-bottom:2rem;font-weight:300;line-height:1.5}

/* FIELDS */
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.4rem}
.field input{
  width:100%;
  padding:13px 14px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:10px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:1rem;
  outline:none;
  transition:border-color .2s;
  -webkit-appearance:none;
  appearance:none;
}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--dim)}

/* Botones */
.btn-main{
  width:100%;
  padding:14px;
  margin-top:.5rem;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-weight:500;
  font-size:1rem;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:.01em;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn-main:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-main:active{transform:translateY(1px);opacity:.9}

.btn-ghost{
  width:100%;
  padding:13px;
  margin-top:.6rem;
  background:transparent;
  color:var(--green);
  border:1px solid rgba(34,211,165,.3);
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-weight:400;
  font-size:.95rem;
  cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn-ghost:hover{background:rgba(34,211,165,.06);border-color:rgba(34,211,165,.6)}
.btn-ghost:active{opacity:.8}

.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0 .5rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:.75rem;color:var(--dim);white-space:nowrap}

.msg{font-size:.82rem;text-align:center;margin-top:.85rem;padding:.6rem .85rem;border-radius:8px;display:none}
.msg.error{background:rgba(226,75,74,.12);color:#f87171;border:1px solid rgba(226,75,74,.2);display:block}
.msg.success{background:rgba(34,211,165,.1);color:var(--green);border:1px solid rgba(34,211,165,.2);display:block}

.loading{display:none;text-align:center;margin-top:.85rem}
.loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin:0 2px;animation:bounce .8s infinite}
.loading-dot:nth-child(2){animation-delay:.15s}
.loading-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

/* PWA install prompt */
.pwa-banner{
  display:none;
  position:fixed;
  bottom:calc(1rem + var(--safe-bottom));
  left:50%;
  transform:translateX(-50%);
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:14px;
  padding:.75rem 1.1rem;
  font-size:.82rem;
  color:var(--text);
  z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  display:flex;
  align-items:center;
  gap:.75rem;
  white-space:nowrap;
  max-width:calc(100vw - 2rem);
}
.pwa-banner.hidden{display:none!important}
.pwa-banner-logo{width:32px;height:32px;border-radius:8px;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pwa-banner-text{font-size:.78rem;color:var(--muted);line-height:1.3}
.pwa-banner-text strong{color:var(--text);display:block}
.pwa-banner-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;flex-shrink:0}
.pwa-banner-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.9rem;padding:4px;flex-shrink:0}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="card">
  <div class="logo-row">
    <span class="logo-dot"></span>
    <span class="logo-text">AUVRO</span>
  </div>

  <h1 class="card-title">Fábrica de Agentes</h1>
  <p class="card-sub">Inicia sesión para gestionar tus agentes</p>

  <div class="field">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" inputmode="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-main" onclick="entrar()">Iniciar sesión</button>

  <div class="divider"><span>¿No tienes cuenta?</span></div>

  <button class="btn-ghost" onclick="registrar()">Crear cuenta nueva</button>

  <div class="loading" id="loading">
    <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
  </div>
  <div class="msg" id="msg"></div>
</div>

<!-- PWA Install Banner -->
<div class="pwa-banner hidden" id="pwa-banner">
  <div class="pwa-banner-logo">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="10,2 17,14 3,14" fill="none" stroke="#0ea5e9" stroke-width="2.2" stroke-linejoin="round"/>
      <line x1="6.5" y1="9.5" x2="13.5" y2="9.5" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="pwa-banner-text">
    <strong>Instalar AUVRO</strong>
    Agrega la app a tu pantalla de inicio
  </div>
  <button class="pwa-banner-btn" onclick="instalarPWA()">Instalar</button>
  <button class="pwa-banner-close" onclick="cerrarBanner()" aria-label="Cerrar">✕</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CONFIG = {
  URL: "https://zsxkfqnalkfvwjrzuqip.supabase.co",
  ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzeGtmcW5hbGtmdndqcnp1cWlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDgyODMsImV4cCI6MjA5MjAyNDI4M30.R4j23l3IHEL966VupeR-Sx_KtDQzB8NzfJtEVDGewGs"
};
const _supabase = supabase.createClient(CONFIG.URL, CONFIG.ANON_KEY);

/* ─── UI ─────────────────────────────────────────────────────────────────── */
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}
function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('msg').className = 'msg';
}

/* ─── AUTH ───────────────────────────────────────────────────────────────── */
async function registrar() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return showMsg('Completa todos los campos', 'error');
  setLoading(true);
  const { error } = await _supabase.auth.signUp({ email, password });
  setLoading(false);
  if (error) showMsg('Error: ' + error.message, 'error');
  else showMsg('¡Cuenta creada! Revisa tu correo para confirmar.', 'success');
}

async function entrar() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return showMsg('Completa todos los campos', 'error');
  setLoading(true);
  const { error } = await _supabase.auth.signInWithPassword({ email, password });
  setLoading(false);
  if (error) showMsg('Error: ' + error.message, 'error');
  else window.location.href = 'dashboard.html';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });

/* ─── SERVICE WORKER ─────────────────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => {
        console.log('[SW] Registrado:', reg.scope);
        // Verificar actualizaciones
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker?.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] Nueva versión disponible');
            }
          });
        });
      })
      .catch(err => console.warn('[SW] Error:', err));
  });
}

/* ─── PWA INSTALL BANNER ─────────────────────────────────────────────────── */
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Mostrar banner solo si no lo rechazaron antes
  try {
    if (!localStorage.getItem('auvro_pwa_dismissed')) {
      document.getElementById('pwa-banner').classList.remove('hidden');
    }
  } catch(_) {}
});

async function instalarPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('pwa-banner').classList.add('hidden');
  if (outcome === 'accepted') {
    try { localStorage.setItem('auvro_pwa_installed', '1'); } catch(_) {}
  }
}

function cerrarBanner() {
  document.getElementById('pwa-banner').classList.add('hidden');
  try { localStorage.setItem('auvro_pwa_dismissed', '1'); } catch(_) {}
}

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-banner').classList.add('hidden');
  deferredPrompt = null;
  console.log('[PWA] App instalada correctamente');
});
</script>
</body>
</html>
