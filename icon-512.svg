<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo maskable completo -->
  <rect width="512" height="512" fill="#06090f"/>

  <!-- Glow radial -->
  <radialGradient id="glow512" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#06090f" stop-opacity="0"/>
  </radialGradient>
  <circle cx="256" cy="256" r="256" fill="url(#glow512)"/>

  <!-- Panel principal circular -->
  <circle cx="256" cy="256" r="188" fill="#0d1117" stroke="#1e2d40" stroke-width="2"/>

  <!-- Anillo decorativo externo -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.15" stroke-dasharray="8 16"/>

  <!-- Anillo decorativo interno -->
  <circle cx="256" cy="256" r="172" fill="none" stroke="#0ea5e9" stroke-width="0.8" stroke-opacity="0.08"/>

  <!-- Gradiente logo -->
  <linearGradient id="logoGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#38bdf8"/>
    <stop offset="60%" stop-color="#0ea5e9"/>
    <stop offset="100%" stop-color="#0284c7"/>
  </linearGradient>

  <!-- Sombra del logo -->
  <filter id="logoShadow">
    <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0ea5e9" flood-opacity="0.35"/>
  </filter>

  <!-- Letra A estilizada grande -->
  <g transform="translate(256,256)" filter="url(#logoShadow)">
    <!-- Triángulo principal A -->
    <polygon points="0,-90 -74,58 74,58" fill="none" stroke="url(#logoGrad512)" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Barra horizontal -->
    <line x1="-37" y1="10" x2="37" y2="10" stroke="url(#logoGrad512)" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- Punto superior animado -->
  <circle cx="256" cy="142" r="12" fill="#38bdf8" opacity="0.95"/>
  <circle cx="256" cy="142" r="18" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.35"/>

  <!-- Puntos decorativos de actividad -->
  <circle cx="174" cy="340" r="5" fill="#22d3a5" opacity="0.6"/>
  <circle cx="338" cy="340" r="5" fill="#22d3a5" opacity="0.6"/>
  <circle cx="256" cy="368" r="4" fill="#0ea5e9" opacity="0.4"/>
</svg>
