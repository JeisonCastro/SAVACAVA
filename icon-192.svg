<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Fondo maskable (safe zone = círculo central) -->
  <rect width="192" height="192" fill="#06090f" rx="0"/>

  <!-- Glow de fondo -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#06090f" stop-opacity="0"/>
  </radialGradient>
  <circle cx="96" cy="96" r="96" fill="url(#glow)"/>

  <!-- Círculo base del ícono -->
  <circle cx="96" cy="96" r="70" fill="#0d1117" stroke="#1e2d40" stroke-width="1.5"/>

  <!-- Gradiente del logo -->
  <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#38bdf8"/>
    <stop offset="100%" stop-color="#0ea5e9"/>
  </linearGradient>

  <!-- Letra A estilizada - AUVRO -->
  <g transform="translate(96,96)">
    <!-- Triángulo A principal -->
    <polygon points="0,-34 -28,22 28,22" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Barra horizontal de la A -->
    <line x1="-14" y1="4" x2="14" y2="4" stroke="url(#logoGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Punto azul animado arriba -->
    <circle cx="0" cy="-46" r="5" fill="#38bdf8" opacity="0.9"/>
  </g>

  <!-- Anillo exterior decorativo -->
  <circle cx="96" cy="96" r="80" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4 8"/>
</svg>
